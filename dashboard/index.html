<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KESSLER // RAMS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<script src="lightweight-charts.js"></script>

<link rel="stylesheet" href="styles.css?v=6">
</head>
<body>

<header class="top-bar">
  <div class="panel metric-card" id="metric-equity">
    <span class="metric-card__label">Equity</span>
    <span class="metric-card__value" id="val-equity">$100,000.00</span>
  </div>

  <div class="panel metric-card" id="metric-dd">
    <span class="metric-card__label">Capital Drawdown</span>
    <span class="metric-card__value" id="val-dd">-0.0%</span>
  </div>

  <div class="panel metric-card" id="metric-status">
    <span class="metric-card__label">System Engine</span>
    <div class="status-indicator">
      <i id="status-dot" class="status-dot"></i>
      <span id="status-text">HFT // SL50-TP100</span>
    </div>
  </div>

  <div class="panel metric-card">
    <span class="metric-card__label">Clock</span>
    <span class="metric-card__value" id="clock" style="font-family: var(--font-mono); font-size: 1.8rem;">00:00:00</span>
  </div>
</header>

<main class="grid-layout">

  <!-- Left Side Panel (Log Stats) -->
  <aside class="panel side-view">
    <div class="panel-header">
      <span>Execution</span>
      <span id="log-count">0 Trades</span>
    </div>
    <!-- Execution log stats could go here if needed, but we put the tape on the bottom -->
    <div style="padding: 24px; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-slate);">
      <p>Strategy: Reversion</p>
      <br>
      <p>Holding: ~200ms</p>
      <br>
      <p>Latency: <span id="val-latency">— ms</span></p>
    </div>
  </aside>

  <!-- Center Chart -->
  <section class="panel chart-view">
    <div class="panel-header">
      <span>NAS100 / Geometric Trace</span>
      <span id="chart-price">—</span>
    </div>
    <div id="chart-container">
      <!-- Chart injected here -->
    </div>
  </section>

  <!-- Right Side Panel (Neural Tensors) -->
  <aside class="panel side-view">
    <div class="panel-header">
      <span>Neural Tensors</span>
      <span id="feed-rate">~20 Hz</span>
    </div>
    <div id="feed">
      <!-- Neural feed here -->
    </div>
  </aside>

</main>

<!-- Bottom Execution Tape -->
<div class="log-ticker" id="execution-log">
  <!-- JS injected log blocks here -->
</div>

<script src="app.js?v=6" defer></script>
</body>
</html>
