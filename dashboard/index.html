<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KESSLER // VISION</title>

<!-- Apple Fonts / Fallbacks -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="lightweight-charts.js"></script>

<link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

<header class="top-bar glass-panel" style="margin: 32px 32px 0 32px;">
  <div class="metric" id="metric-equity">
    <span class="metric__label">Equity</span>
    <span class="metric__value" id="val-equity">$100,000.00</span>
  </div>

  <div class="metric metric--dd" id="metric-dd">
    <span class="metric__label">Daily Drawdown</span>
    <span class="metric__value" id="val-dd">-0.0% / 5.0%</span>
  </div>

  <div class="metric" id="metric-status">
    <div class="metric__label">System</div>
    <div class="metric__value metric__value--status">
      <i id="status-dot" class="status-dot"></i>
      <span id="status-text">HFT // SL50-TP100</span>
      <span class="metric__divider">·</span>
      <span id="val-latency">— ms</span>
    </div>
  </div>

  <div class="metric">
    <span class="metric__label">Clock</span>
    <span class="metric__value" id="clock" style="font-family: var(--font-mono); font-size: 1.2rem;">00:00:00 UTC</span>
  </div>
</header>

<main class="main-content" style="margin-top: 24px;">

  <!-- Log Section (Left Foreground) -->
  <aside class="log-section glass-panel">
    <div class="log-section__header">
      <span class="log-section__title">Execution Log</span>
      <span class="log-count" id="log-count">0 Trades</span>
    </div>
    <div id="execution-log">
      <!-- JS injected log rows here -->
    </div>
  </aside>

  <!-- Chart Section (Center Midground) -->
  <section class="chart-section glass-panel">
    <div class="log-section__header">
      <span class="log-section__title">NAS100 / Spatial Rendering</span>
      <span class="log-count" id="chart-price">—</span>
    </div>
    <div id="chart-stub" style="flex: 1; border-radius: 16px; overflow: hidden; margin: 16px; height: 100%;">
      <!-- Chart injected here -->
    </div>
  </section>

  <!-- Feed Section (Right Background) -->
  <aside class="feed-section glass-panel">
    <div class="feed-section__header">
      <span class="feed-section__title">Neural Tensors</span>
      <span class="log-count" id="feed-rate">~20 Hz</span>
    </div>
    <div id="feed">
      <!-- Neural feed here -->
    </div>
  </aside>

</main>

<script src="app.js?v=2" defer></script>
</body>
</html>
