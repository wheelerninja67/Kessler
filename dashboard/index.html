<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KESSLER // OPS</title>

<!-- Progressive enhancement only — full offline fallback stack is defined in styles.css -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="lightweight-charts.js"></script>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="shell">

  <header class="killswitch" id="killswitch">

    <div class="killswitch__brand">
      <span class="brand__mark">KESSLER</span>
      <span class="brand__sub">AUTONOMOUS EXECUTION&nbsp;//&nbsp;NAS100</span>
    </div>

    <div class="killswitch__metrics">

      <div class="metric" id="metric-equity">
        <span class="metric__label">EQUITY</span>
        <span class="metric__value" id="val-equity">$100,000.00</span>
      </div>

      <div class="metric metric--dd" id="metric-dd">
        <span class="metric__label">DAILY DD&nbsp;/&nbsp;LIMIT</span>
        <span class="metric__value" id="val-dd">-0.0%&nbsp;/&nbsp;5.0%</span>
      </div>

      <div class="metric" id="metric-status">
        <div class="metric__label">SYSTEM</div>
        <div class="metric__value metric__value--status">
          <i id="status-dot" class="status-dot"></i>
          <span id="status-text">BATCH 2 // SL50-TP100</span>
        </div>  <span class="metric__divider">·</span>
          <span id="val-latency">— ms</span>
        </span>
      </div>

    </div>

    <div class="killswitch__clock" id="clock" aria-label="System clock">00:00:00 UTC</div>

  </header>

  <main class="floor">

    <aside class="panel panel--feed" aria-label="Neural feed">
      <div class="panel__head">
        <span>NEURAL FEED</span>
        <span class="panel__head-sub" id="feed-rate">~3.3 Hz</span>
      </div>
      <div class="feed" id="feed" role="log" aria-live="polite" aria-relevant="additions"></div>
    </aside>

    <section class="panel panel--chart" aria-label="Price chart">
      <div class="panel__head">
        <span>NAS100&nbsp;//&nbsp;5M</span>
        <span class="panel__head-sub" id="chart-price">—</span>
      </div>
      <div class="chart-stub" id="chart-stub">
        <span class="chart-stub__text">[KESSLER_VISUAL_MATRIX_PENDING]</span>
      </div>
    </section>

    <aside class="panel panel--log" aria-label="Execution log">
      <div class="panel__head">
        <span>EXECUTION LOG</span>
        <span class="panel__head-sub" id="log-count">0 TRADES</span>
      </div>
      <div class="log-scroll">
        <table class="log-table">
          <thead>
            <tr>
              <th scope="col">TIME</th>
              <th scope="col">ACTION</th>
              <th scope="col">ENTRY</th>
              <th scope="col">EXIT</th>
              <th scope="col">PNL</th>
              <th scope="col">DUR</th>
            </tr>
          </thead>
          <tbody id="log-body"></tbody>
        </table>
      </div>
    </aside>

  </main>

</div>

<script src="app.js" defer></script>
</body>
</html>
